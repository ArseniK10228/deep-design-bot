# Reverse proxy для бота И приложения (Mini App)
# Используйте, когда Render/домен заблокирован для пользователей (например в РФ)
#
# 1. Поднимите VPS (Ubuntu, EU), установите nginx + certbot
# 2. Создайте A‑запись: tg-app.yourdomain.com -> IP_VPS
# 3. Скопируйте этот конфиг в /etc/nginx/sites-available/tg-proxy
# 4. В location / замените proxy_pass на ваш Render URL
# 5. ln -s .../tg-proxy .../sites-enabled && nginx -t && systemctl reload nginx
# 6. certbot --nginx -d tg-app.yourdomain.com
# 7. В Render добавьте:
#    TELEGRAM_API_BASE_URL=https://tg-app.yourdomain.com
#    WEBAPP_URL=https://tg-app.yourdomain.com
#    SOCKS5_PROXY_URL=  (оставьте пустым — API идёт через ваш nginx, не через SOCKS)

server {
    listen 80;
    server_name tg-app.yourdomain.com;

    # Telegram Bot API
    location /bot {
        proxy_pass https://api.telegram.org;
        proxy_http_version 1.1;
        proxy_set_header Host api.telegram.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_connect_timeout 20s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Mini App и статика (проксируем на Render)
    # Замените https://deep-design-bot.onrender.com на ваш URL
    location / {
        proxy_pass https://deep-design-bot.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
