# /etc/nginx/sites-available/tg-proxy
# Полный конфиг для app.deepdesignpc.ru

server {
    listen 80;
    server_name app.deepdesignpc.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name app.deepdesignpc.ru;

    ssl_certificate /etc/letsencrypt/live/app.deepdesignpc.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.deepdesignpc.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Telegram Bot API (и /bot, и /file/bot)
    location ~ ^/(bot|file/bot) {
        proxy_pass https://api.telegram.org;
        proxy_http_version 1.1;
        proxy_set_header Host api.telegram.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Mini App и статика (Render)
    location / {
        proxy_pass https://deep-design-bot.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host deep-design-bot.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
